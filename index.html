document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

by teams and customers across the globe — helping them launch faster and convert better.<\u002Fp>\n        <p style=\"margin:0 0 28px;font-size:16px;line-height:1.6;color:#34322c;\">I care about typography, motion, and the quiet details that make an interface feel inevitable.<\u002Fp>\n        <a href=\"#contact\" style=\"display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink,#17150f);font-weight:600;font-size:17px;border-bottom:2px solid var(--accent,#1F4DFF);padding-bottom:4px;\">Let’s talk <span style=\"display:inline-flex;width:26px;height:26px;border-radius:999px;background:var(--accent,#1F4DFF);color:#fff;align-items:center;justify-content:center;font-size:13px;\">↗<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- EXPERIENCE / RESUME -->\n  <section id=\"experience\" style=\"max-width:1280px;margin:0 auto;padding:70px 40px 100px;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:48px;\">\n      <h2 style=\"margin:0;font-weight:800;font-size:clamp(48px,8vw,128px);line-height:0.9;letter-spacing:-0.04em;\">Experience<\u002Fh2>\n      <a href=\"uploads/Karthick_D_UIUX_Resume.pdf\" download=\"Karthick_D_UIUX_Resume.pdf\" onclick=\"{{ downloadResume }}\" style=\"display:inline-flex;align-items:center;gap:11px;background:var(--ink,#17150f);color:var(--cream,#f1eee4);text-decoration:none;padding:14px 24px;border-radius:999px;font-weight:600;font-size:15px;white-space:nowrap;margin-bottom:8px;cursor:pointer;\" style-hover=\"background:var(--accent,#1F4DFF);\">Download Résumé <span style=\"display:inline-flex;width:24px;height:24px;border-radius:999px;background:rgba(255,255,255,.16);align-items:center;justify-content:center;font-size:13px;\">↓<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n\n    <div style=\"border-top:1px solid #d8d4c8;\">\n      <sc-if value=\"{{ exp1Active }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;grid-template =\"{{ e3Period }}\" onchange=\"{{ e3PeriodCh }}\" style=\"background:#1e1c17;border:1px solid #322f28;border-radius:10px;padding:12px 15px;color:#f1eee4;font-size:14px;font-family:'Archivo',sans-serif;outline:none;\" style-focus=\"border-color:var(--accent,#1F4DFF);\">\n            <input type=\"text\" placeholder=\"Role title\" value=\"{{ e3Role }}\" onchange=\"{{ e3RoleCh }}\" style=\"background:#1e1c17;border:1px solid #322f28;border-radius:10px;padding:12px 15px;color:#f1eee4;font-size:14px;font-family:'Archivo',sans-serif;outline:none;\" style-focus=\"border-color:var(--accent,#1F4DFF);\">\n            <input type=\"text\" placeholder=\"Company name\" value=\"{{ e3Company }}\" onchange=\"{{ e3CompanyCh }}\" style=\"background:#1e1c17;border:1px solid #322f28;border-radius:10px;padding:12px 15px;color:#f1eee4;font-size:14px;font-family:'Archivo',sans-serif;outline:none;\" style-focus=\"border-color:var(--accent,#1F4DFF);\">\n            <input type=\"text\" placeholder=\"Tags (e.g. Product · Design Systems · Web)\" value=\"{{ e3Tags }}\" onchange=\"{{ e3TagsCh }}\" style=\"background:#1e1c17;border:1px solid #322f28;border-radius:10px;padding:12px 15px;color:#f1eee4;font-size:14px;font-family:'Archivo',sans-serif;outline:none;\" style-focus=\"border-color:var(--accent,#1F4DFF);\">\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ exp3Deleted }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#1e1c17;border:1px solid #3a2a2a;border-radius:10px;padding:12px 16px;font-size:13px;color:#6f6c63;text-align:center;\">Hidden from portfolio<\u002Fdiv>\n          <\u002Fsc-if>\n            <input type=\"text\" placeholder=\"Role title\" value=\"{{ e3Role }}\" onchange=\"{{ e3RoleCh }}\" style=\"background:#1e1c17;border:1px solid #322f28;border-radius:10px;padding:12px 15px;color:#f1eee4;font-size:14px;font-family:'Archivo',sans-serif;outline:none;\" style-focus=\"border-color:var(--accent,#1F4DFF);\">\n            <input type=\"text\" placeholder=\"Company name\" value=\"{{ e3Company }}\" onchange=\"{{ e3CompanyCh }}\" style=\"background:#1e1c17;border:1px solid #322f28;border-radius:10px;padding:12px 15px;color:#f1eee4;font-size:14px;font-family:'Archivo',sans-serif;outline:none;\" style-focus=\"border-color:var(--accent,#1F4DFF);\">\n            <input type=\"text\" placeholder=\"Tags\" value=\"{{ e3Tags }}\" onchange=\"{{ e3TagsCh }}\" style=\"background:#1e1c17;border:1px solid #322f28;border-radius:10px;padding:12px 15px;color:#f1eee4;font-size:14px;font-family:'Archivo',sans-serif;outline:none;\" style-focus=\"border-color:var(--accent,#1F4DFF);\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        \n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n  <!-- PANEL TOGGLE BUTTON — owner only (Ctrl+Shift+E to reveal) -->\n  <sc-if value=\"{{ editMode }}\" hint-placeholder-val=\"{{ false }}\">\n    <button onclick=\"{{ togglePanel }}\" style=\"position:fixed;bottom:28px;right:28px;z-index:601;background:#17150f;color:#f1eee4;border:1.5px solid #2a2821;border-radius:999px;padding:12px 22px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.04em;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.32);\" style-hover=\"background:var(--accent,#1F4DFF);border-color:var(--accent,#1F4DFF);\">✏ Edit Projects<\u002Fbutton>\n  <\u002Fsc-if>\n\n  <!-- CUSTOM CURSOR -->\n  <sc-if value=\"{{ customCursor }}\" hint-placeholder-val=\"{{ true }}\">\n    <div ref=\"{{ cursorRef }}\" style=\"position:fixed;top:0;left:0;width:68px;height:68px;border-radius:999px;background:var(--accent,#1F4DFF);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;pointer-events:none;z-index:300;opacity:0;transform:translate(-50%,-50%) scale(0.2);transition:opacity .25s ease,transform .3s cubic-bezier(.2,.9,.3,1);will-change:left,top;\">View<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#1F4DFF&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;customCursor&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.cursorRef = React.createRef();\n    this.worksRef = React.createRef();\n    this.skillsRef = React.createRef();\n    const defaultProjects = [\n      {name:'Calm Choice', tag:'UX Case Study', url:'https://calm-choice.netlify.app/', deleted:false},\n      {name:'Lumen', tag:'SaaS Dashboard', url:'https://www.behance.net/gallery/228366799/Momentum-(Fitness-App-UIUX-Case-Study)', deleted:false},\n      {name:'Nest', tag:'E-commerce Redesign', url:'https://www.behance.net/gallery/251380343/Skill-Loop-(Ed-Tech-App-UIUX-Case-Study)-(2026)', deleted:false},\n      {name:'Pulse', tag:'Health Tracker', url:'#', deleted:false},\n    ];\n    let savedProjects = defaultProjects;\n    try { const s = localStorage.getItem('kd_projects'); if(s) savedProjects = JSON.parse(s); } catch(e){}\n    const defaultExp = [\n      {period:'2023 — Now', role:'Senior Product Designer', company:'Studio / Company name', tags:'Product · Design Systems · Web', deleted:false},\n      {period:'2021 — 2023', role:'Product Designer', company:'Studio / Company name', tags:'Mobile · SaaS · Prototyping', deleted:false},\n      {period:'2019 — 2021', role:'UI/UX Designer', company:'Studio / Company name', tags:'UI · Research · Branding', deleted:false},\n      ];\n    let savedExp = defaultExp;\n    try { const se = localStorage.getItem('kd_experience'); if(se) savedExp = JSON.parse(se); } catch(e){}\n    this.state = { sent: false, active: 'top', panelOpen: false, panelTab: 'projects', projects: savedProjects, experience: savedExp, formName: '', formMsg: '', editMode: false };\n  }\n  _updateProject(i, key, val){\n    const projects = this.state.projects.map((p,idx) => idx===i ? {...p, [key]:val} : p);\n    this.setState({projects});\n    try { localStorage.setItem('kd_projects', JSON.stringify(projects)); } catch(e){}\n  }\n  _updateExp(i, key, val){\n    const experience = this.state.experience.map((e,idx) => idx===i ? {...e, [key]:val} : e);\n    this.setState({experience});\n    try { localStorage.setItem('kd_experience', JSON.stringify(experience)); } catch(e){}\n  }\n  componentDidMount(){\n\n    this._onScroll = () => {\n      const mid = window.scrollY + window.innerHeight * 0.35;\n      let act = 'top';\n      ['about','experience','work','skills','contact'].forEach((id) => {\n        const el = document.getElementById(id);\n        if (el && el.offsetTop <= mid) act = id;\n      });\n      if (this.state.active !== act) this.setState({ active: act });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n\n    // Secret edit mode: Ctrl+Shift+E\n    this._keyEdit = (e) => {\n      if (e.ctrlKey && e.shiftKey && e.key === 'E') {\n        this.setState(s => ({ editMode: !s.editMode, panelOpen: s.editMode ? false : s.panelOpen }));\n      }\n    };\n    window.addEventListener('keydown', this._keyEdit);\n\n    // Scroll-driven 3D portrait: twists, travels hero -> between the About columns, B&W -> color midway\n    this._photoTick = () => {\n      const photo = document.getElementById('hero-portrait');\n      const a1 = document.getElementById('hero-anchor');\n      const a2 = document.getElementById('about-anchor');\n      if (!photo || !a1 || !a2) return;\n      const r1 = a1.getBoundingClientRect();\n      const r2 = a2.getBoundingClientRect();\n      const sY = window.scrollY || window.pageYOffset || 0;\n      const aboutCenterAbs = r2.top + sY + r2.height / 2;\n      const endScroll = Math.max(1, aboutCenterAbs - window.innerHeight / 2);\n      let p = sY / endScroll; p = p < 0 ? 0 : p > 1 ? 1 : p;\n      const pe = p * p * (3 - 2 * p);\n      const c1x = r1.left + r1.width / 2, c1y = r1.top + r1.height / 2;\n      const c2x = r2.left + r2.width / 2, c2y = r2.top + r2.height / 2;\n      const x = c1x + (c2x - c1x) * pe;\n      const y = c1y + (c2y - c1y) * pe;\n      const scale = 0.62 + (1 - 0.62) * pe;\n      const rot = pe * 360;\n      const gray = Math.max(0, Math.min(1, 1 - (p - 0.5) * 2));\n      photo.style.left = x + 'px';\n      photo.style.top = y + 'px';\n      photo.style.transform = 'translate(-50%,-50%) perspective(1200px) rotateY(' + rot + 'deg) scale(' + scale + ')';\n      photo.style.filter = 'grayscale(' + gray + ')';\n    };\n    this._photoRaf = null;\n    this._photoOnScroll = () => {\n      if (this._photoRaf) return;\n      this._photoRaf = requestAnimationFrame(() => { this._photoRaf = null; this._photoTick(); });\n    };\n    window.addEventListener('scroll', this._photoOnScroll, { passive: true });\n    window.addEventListener('resize', this._photoOnScroll);\n    this._photoTick();\n    setTimeout(this._photoTick, 350);\n\n    const cur = this.cursorRef.current;\n    const area = this.worksRef.current;\n\n    // Letter pop animation for KARTHICK\n    const word = document.getElementById('karthick-word');\n    if (word) {\n      const letters = word.querySelectorAll('span');\n      const io = new IntersectionObserver((entries) => {\n        if (entries[0].isIntersecting) {\n          letters.forEach((el, i) => {\n            el.style.animation = 'letterPop 0.65s cubic-bezier(.22,.9,.36,1) forwards';\n            el.style.animationDelay = (i * 0.07) + 's';\n          });\n          io.disconnect();\n        }\n      }, { threshold: 0.3 });\n      io.observe(word);\n    }\n    if (cur){\n      this._move = (e) => { cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px'; };\n      window.addEventListener('mousemove', this._move, { passive: true });\n    }\n    if (cur && area){\n      this._enter = () => { cur.style.opacity = '1'; cur.style.transform = 'translate(-50%,-50%) scale(1)'; };\n      this._leave = () => { cur.style.opacity = '0'; cur.style.transform = 'translate(-50%,-50%) scale(0.2)'; };\n      area.addEventListener('mouseenter', this._enter);\n      area.addEventListener('mouseleave', this._leave);\n    }\n  }\n  componentWillUnmount(){\n    if (this._keyEdit) window.removeEventListener('keydown', this._keyEdit);\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    if (this._photoOnScroll) { window.removeEventListener('scroll', this._photoOnScroll); window.removeEventListener('resize', this._photoOnScroll); }\n    if (this._move) window.removeEventListener('mousemove', this._move);\n    const area = this.worksRef.current;\n    if (area && this._enter){ area.removeEventListener('mouseenter', this._enter); area.removeEventListener('mouseleave', this._leave); }\n  }\n  renderVals(){\n    const a = this.state.active || 'top';\n    const ab = (a === 'about');\n    const wk = (a === 'experience' || a === 'work' || a === 'skills');\n    const ct = (a === 'contact');\n    const bg = (on) => on ? 'var(--accent,#1F4DFF)' : 'transparent';\n    const fg = (on) => on ? '#fff' : '#b8b5ab';\n    const ps = this.state.projects;\n    const es = this.state.experience;\n    const up = (i, key) => (e) => this._updateProject(i, key, e.target.value);\n    const ue = (i, key) => (e) => this._updateExp(i, key, e.target.value);\n    const tab = this.state.panelTab || 'projects';\n    const tabIsProj = tab === 'projects';\n    return {\n      submitLabel: this.state.sending ? 'Sending…' : 'Send Message ↗',\n      sending: !!this.state.sending,\n      formError: this.state.formError || '',\n      workBg: bg(wk), workFg: fg(wk),\n      aboutBg: bg(ab), aboutFg: fg(ab),\n      contactBg: bg(ct), contactFg: fg(ct),\n      proj1Name: ps[0].name, proj1Tag: ps[0].tag, proj1Url: ps[0].url,\n      proj2Name: ps[1].name, proj2Tag: ps[1].tag, proj2Url: ps[1].url,\n      proj3Name: ps[2].name, proj3Tag: ps[2].tag, proj3Url: ps[2].url,\n      proj4Name: ps[3].name, proj4Tag: ps[3].tag, proj4Url: ps[3].url,\n      p1Name: ps[0].name, p1Tag: ps[0].tag, p1Url: ps[0].url,\n      p1NameCh: up(0,'name'), p1TagCh: up(0,'tag'), p1UrlCh: up(0,'url'),\n      p2Name: ps[1].name, p2Tag: ps[1].tag, p2Url: ps[1].url,\n      p2NameCh: up(1,'name'), p2TagCh: up(1,'tag'), p2UrlCh: up(1,'url'),\n      p3Name: ps[2].name, p3Tag: ps[2].tag, p3Url: ps[2].url,\n      p3NameCh: up(2,'name'), p3TagCh: up(2,'tag'), p3UrlCh: up(2,'url'),\n      p4Name: ps[3].name, p4Tag: ps[3].tag, p4Url: ps[3].url,\n      p4NameCh: up(3,'name'), p4TagCh: up(3,'tag'), p4UrlCh: up(3,'url'),\n      // project active/delete\n      proj1Active: !ps[0].deleted, proj1Deleted: !!ps[0].deleted,\n      proj2Active: !ps[1].deleted, proj2Deleted: !!ps[1].deleted,\n      proj3Active: !ps[2].deleted, proj3Deleted: !!ps[2].deleted,\n      proj4Active: !ps[3].deleted, proj4Deleted: !!ps[3].deleted,\n      delProj1: () => this._updateProject(0,'deleted',true), restoreProj1: () => this._updateProject(0,'deleted',false),\n      delProj2: () => this._updateProject(1,'deleted',true), restoreProj2: () => this._updateProject(1,'deleted',false),\n      delProj3: () => this._updateProject(2,'deleted',true), restoreProj3: () => this._updateProject(2,'deleted',false),\n      delProj4: () => this._updateProject(3,'deleted',true), restoreProj4: () => this._updateProject(3,'deleted',false),\n      // experience active/delete\n      exp1Active: !es[0].deleted, exp1Deleted: !!es[0].deleted,\n      exp2Active: !es[1].deleted, exp2Deleted: !!es[1].deleted,\n      exp3Active: !es[2].deleted, exp3Deleted: !!es[2].deleted,\n\n      delExp1: () => this._updateExp(0,'deleted',true), restoreExp1: () => this._updateExp(0,'deleted',false),\n      delExp2: () => this._updateExp(1,'deleted',true), restoreExp2: () => this._updateExp(1,'deleted',false),\n      delExp3: () => this._updateExp(2,'deleted',true), restoreExp3: () => this._updateExp(2,'deleted',false),\n\n      // experience card data\n      exp1Period: es[0].period, exp1Role: es[0].role, exp1Company: es[0].company, exp1Tags: es[0].tags,\n      exp2Period: es[1].period, exp2Role: es[1].role, exp2Company: es[1].company, exp2Tags: es[1].tags,\n      exp3Period: es[2].period, exp3Role: es[2].role, exp3Company: es[2].company, exp3Tags: es[2].tags,\n\n      // experience panel inputs\n      e1Period: es[0].period, e1Role: es[0].role, e1Company: es[0].company, e1Tags: es[0].tags,\n      e1PeriodCh: ue(0,'period'), e1RoleCh: ue(0,'role'), e1CompanyCh: ue(0,'company'), e1TagsCh: ue(0,'tags'),\n      e2Period: es[1].period, e2Role: es[1].role, e2Company: es[1].company, e2Tags: es[1].tags,\n      e2PeriodCh: ue(1,'period'), e2RoleCh: ue(1,'role'), e2CompanyCh: ue(1,'company'), e2TagsCh: ue(1,'tags'),\n      e3Period: es[2].period, e3Role: es[2].role, e3Company: es[2].company, e3Tags: es[2].tags,\n      e3PeriodCh: ue(2,'period'), e3RoleCh: ue(2,'role'), e3CompanyCh: ue(2,'company'), e3TagsCh: ue(2,'tags'),\n\n      // tab state\n      tabIsProjects: tabIsProj,\n      tabIsExp: !tabIsProj,\n      tabProjBg: tabIsProj ? '#f1eee4' : 'transparent',\n      tabProjFg: tabIsProj ? '#17150f' : '#8b887e',\n      tabExpBg: !tabIsProj ? '#f1eee4' : 'transparent',\n      tabExpFg: !tabIsProj ? '#17150f' : '#8b887e',\n      showProjects: () => this.setState({panelTab:'projects'}),\n      showExp: () => this.setState({panelTab:'experience'}),\n      panelOpen: this.state.panelOpen,\n      editMode: this.state.editMode,\n      togglePanel: () => this.setState(s => ({panelOpen: !s.panelOpen})),\n      closePanel: () => this.setState({panelOpen: false}),\n      openLinkedIn: (e) => { e.preventDefault(); window.open('https://www.linkedin.com/in/contact-karthick/', '_blank'); },\n      openBehance: (e) => { e.preventDefault(); window.open('https://www.behance.net/gallery/228366799/Momentum-(Fitness-App-UIUX-Case-Study)', '_blank'); },\n      accent: this.props.accent ?? '#1F4DFF',\n      customCursor: this.props.customCursor ?? true,\n      cursorRef: this.cursorRef,\n      worksRef: this.worksRef,\n      sent: this.state.sent,\n      notSent: !this.state.sent,\n      downloadResume: async (e) => {\n        if (e && e.preventDefault) e.preventDefault();\n        const url = (window.__resources && window.__resources.resumePdf) ? window.__resources.resumePdf : 'uploads/Karthick_D_UIUX_Resume.pdf';\n        const filename = 'Karthick_D_UIUX_Resume.pdf';\n        try {\n          const res = await fetch(url);\n          if (!res.ok) throw new Error('fetch failed');\n          const blob = await res.blob();\n          const blobUrl = URL.createObjectURL(blob);\n          const a = document.createElement('a');\n          a.href = blobUrl;\n          a.download = filename;\n          document.body.appendChild(a);\n          a.click();\n          document.body.removeChild(a);\n          setTimeout(() => URL.revokeObjectURL(blobUrl), 4000);\n        } catch (err) {\n          window.open(url, '_blank');\n        }\n      },\n      nameChange: (e) => this.setState({ formName: e.target.value }),\n      emailChange: (e) => this.setState({ formEmail: e.target.value }),\n      msgChange: (e) => this.setState({ formMsg: e.target.value }),\n      submit: async (e) => {\n        if (e && e.preventDefault) e.preventDefault();\n        if (this.state.sending) return;\n        const name = (this.state.formName || '').trim();\n        const email = (this.state.formEmail || '').trim();\n        const msg = (this.state.formMsg || '').trim();\n        if (!name || !email || !msg) { this.setState({ formError: 'Please fill in your name, email and message.' }); return; }\n        this.setState({ sending: true, formError: '' });\n        try {\n          const res = await fetch('https://api.web3forms.com/submit', {\n            method: 'POST',\n            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },\n            body: JSON.stringify({\n              access_key: '9c653794-59de-4943-81d1-f82787010cf8',\n              subject: 'Portfolio Enquiry' + (name ? ' from ' + name : ''),\n              from_name: name,\n              name: name,\n              email: email,\n              message: msg\n            })\n          });\n          const data = await res.json();\n          if (data.success) { this.setState({ sent: true, sending: false }); }\n          else { this.setState({ sending: false, formError: data.message || 'Something went wrong. Try again.' }); }\n        } catch (err) {\n          this.setState({ sending: false, formError: 'Network error. Please try again.' });\n        }\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
